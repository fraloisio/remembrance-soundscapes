<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Sonic Runs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #0d0f0c;
      color: #e8d7be;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      min-height: 100vh;
    }

    /* ── top bar ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2rem;
      border-bottom: 1px solid #2a2e27;
      gap: 1rem;
    }
    header h1 {
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8d7be;
    }
    #status-bar {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #8a8a6a;
      flex: 1;
      text-align: center;
    }
    #status-bar.error { color: #e05555; }
    #status-bar.ok    { color: #5db87a; }

    /* ── token panel ── */
    #token-panel {
      max-width: 460px;
      margin: 4rem auto;
      padding: 2rem;
      border: 1px solid #2a2e27;
      border-radius: 4px;
    }
    #token-panel p {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      line-height: 1.8;
      margin-bottom: 1.2rem;
      color: #a09880;
    }
    #token-panel input {
      width: 100%;
      background: #1a1d18;
      border: 1px solid #3a3e35;
      color: #e8d7be;
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      padding: 0.55rem 0.75rem;
      border-radius: 3px;
      margin-bottom: 0.8rem;
    }
    #token-panel input:focus { outline: none; border-color: #6a6e5a; }

    /* ── controls bar ── */
    #controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 2rem;
      border-bottom: 1px solid #1e211c;
      flex-wrap: wrap;
    }
    #search-input {
      background: #141713;
      border: 1px solid #2a2e27;
      color: #e8d7be;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.72rem;
      padding: 0.38rem 0.7rem;
      border-radius: 3px;
      width: 220px;
      letter-spacing: 0.05em;
    }
    #search-input:focus { outline: none; border-color: #5a5e4a; }
    #search-input::placeholder { color: #4a4e3a; }

    select {
      background: #141713;
      border: 1px solid #2a2e27;
      color: #e8d7be;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.7rem;
      padding: 0.38rem 0.7rem;
      border-radius: 3px;
      letter-spacing: 0.05em;
      cursor: pointer;
    }
    select:focus { outline: none; }

    #record-count {
      margin-left: auto;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5a5e4a;
    }

    /* ── buttons ── */
    .btn {
      font-family: 'Jost', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.38rem 0.9rem;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .btn-primary { background: #2e4a35; color: #a0d4a8; border-color: #3e6a45; }
    .btn-danger  { background: #4a1e1e; color: #e08080; border-color: #6a2e2e; }
    .btn-ghost   { background: transparent; color: #6a6e5a; border-color: #2a2e27; }

    /* ── table ── */
    #table-wrap {
      padding: 1.5rem 2rem 4rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #5a5e4a;
      padding: 0 0.75rem 0.7rem;
      text-align: left;
      border-bottom: 1px solid #1e211c;
    }
    thead th.col-img   { width: 90px; }
    thead th.col-id    { width: 50px; }
    thead th.col-time  { width: 140px; }
    thead th.col-act   { width: 80px; text-align: right; }

    tbody tr {
      border-bottom: 1px solid #161917;
      transition: background 0.1s;
    }
    tbody tr:hover { background: #131613; }
    tbody tr.deleting { opacity: 0.35; pointer-events: none; }

    td {
      padding: 0.65rem 0.75rem;
      vertical-align: middle;
    }

    /* thumbnail */
    .thumb-wrap {
      width: 72px;
      height: 52px;
      overflow: hidden;
      border-radius: 2px;
      background: #1a1d18;
      cursor: context-menu;
      position: relative;
    }
    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-wrap .thumb-missing {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      color: #3a3e35;
      letter-spacing: 0.1em;
    }

    .col-id-val {
      font-size: 0.68rem;
      color: #5a5e4a;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .col-title-val {
      font-size: 0.78rem;
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0.03em;
    }
    .col-title-val small {
      display: block;
      font-size: 0.6rem;
      color: #6a6e5a;
      font-weight: 200;
      letter-spacing: 0.05em;
      margin-top: 0.2em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }

    .col-time-val {
      font-size: 0.65rem;
      color: #7a7e6a;
      font-weight: 200;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .del-btn {
      float: right;
      font-family: 'Jost', sans-serif;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.6rem;
      border-radius: 2px;
      cursor: pointer;
      border: 1px solid #3a1e1e;
      background: transparent;
      color: #7a4040;
      transition: all 0.15s;
    }
    .del-btn:hover { background: #3a1a1a; color: #e08080; border-color: #6a2e2e; }

    /* ── context menu ── */
    #ctx-menu {
      position: fixed;
      background: #1a1d18;
      border: 1px solid #2e3228;
      border-radius: 4px;
      padding: 0.3rem 0;
      min-width: 160px;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      display: none;
    }
    #ctx-menu.visible { display: block; }
    .ctx-item {
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      color: #a09880;
      transition: background 0.1s;
    }
    .ctx-item:hover { background: #252820; color: #e8d7be; }
    .ctx-item.danger { color: #e08080; }
    .ctx-item.danger:hover { background: #2e1818; }
    .ctx-sep { border-top: 1px solid #2a2e27; margin: 0.2rem 0; }

    /* ── empty state ── */
    #empty-state {
      text-align: center;
      padding: 4rem 2rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: #3a3e35;
      display: none;
    }

    /* ── spinner ── */
    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #3a3e35;
      border-top-color: #e8d7be;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>Sonic Runs — Admin</h1>
    <span id="status-bar">Loading…</span>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <button class="btn btn-ghost" id="refresh-btn">Refresh</button>
      <button class="btn btn-ghost" id="token-btn" title="Change GitHub token">Token</button>
    </div>
  </header>

  <!-- Token setup -->
  <div id="token-panel" style="display:none">
    <p>Enter your GitHub personal access token (repo write scope). It is stored only in this browser via <code>localStorage</code> — never sent anywhere except GitHub's API.</p>
    <input type="password" id="token-input" placeholder="ghp_…" autocomplete="off" />
    <button class="btn btn-primary" id="token-save-btn" style="width:100%">Save &amp; Load Records</button>
  </div>

  <!-- Controls -->
  <div id="controls" style="display:none">
    <input type="search" id="search-input" placeholder="Search titles…" />
    <select id="sort-select">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="az">Title A → Z</option>
      <option value="za">Title Z → A</option>
    </select>
    <select id="csv-select">
      <option value="records.csv">Live (records.csv)</option>
      <option value="records-archive-1.csv">Archive 1</option>
    </select>
    <span id="record-count"></span>
  </div>

  <!-- Table -->
  <div id="table-wrap" style="display:none">
    <table id="records-table">
      <thead>
        <tr>
          <th class="col-img">Image</th>
          <th class="col-id">ID</th>
          <th>Title / Prompt</th>
          <th class="col-time">Timestamp</th>
          <th class="col-act"></th>
        </tr>
      </thead>
      <tbody id="records-body"></tbody>
    </table>
    <div id="empty-state">No records found.</div>
  </div>

  <!-- Context menu -->
  <div id="ctx-menu">
    <div class="ctx-item" id="ctx-open">Open image in new tab</div>
    <div class="ctx-item" id="ctx-audio">Open audio in new tab</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" id="ctx-delete">Delete this record</div>
  </div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const GITHUB_OWNER = 'fraloisio';
const GITHUB_REPO  = 'sonic-runs-assets';
const GITHUB_BRANCH = 'main';
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/`;
const API_BASE = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/`;

// ── State ────────────────────────────────────────────────────────────────────
let allRecords = [];
let currentCsv = 'records.csv';
let ctxRecord  = null;

// ── Token ────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('gh_token') || ''; }
function saveToken(t) { localStorage.setItem('gh_token', t.trim()); }

function authHeaders() {
  return {
    'Authorization': `token ${getToken()}`,
    'Accept': 'application/vnd.github.v3+json',
  };
}

// ── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (getToken()) {
    showMain();
    loadRecords();
  } else {
    showTokenPanel();
  }
});

document.getElementById('token-save-btn').addEventListener('click', () => {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  saveToken(t);
  showMain();
  loadRecords();
});

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('token-save-btn').click();
});

document.getElementById('token-btn').addEventListener('click', () => {
  document.getElementById('token-input').value = getToken();
  document.getElementById('token-panel').style.display = 'block';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('table-wrap').style.display = 'none';
});

document.getElementById('refresh-btn').addEventListener('click', loadRecords);

// ── Sort & Search ─────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', renderTable);
document.getElementById('sort-select').addEventListener('change', renderTable);
document.getElementById('csv-select').addEventListener('change', () => {
  currentCsv = document.getElementById('csv-select').value;
  loadRecords();
});

function showTokenPanel() {
  document.getElementById('token-panel').style.display = 'block';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('table-wrap').style.display = 'none';
  setStatus('Enter your GitHub token to continue.', '');
}

function showMain() {
  document.getElementById('token-panel').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('table-wrap').style.display = 'block';
}

// ── Load CSV from GitHub ──────────────────────────────────────────────────────
async function loadRecords() {
  setStatus('<span class="spinner"></span>Loading…', '');
  try {
    const url = `${RAW_BASE}${currentCsv}?t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
    allRecords = parsed.data;
    renderTable();
    setStatus(`${allRecords.length} record${allRecords.length !== 1 ? 's' : ''} loaded from ${currentCsv}`, 'ok');
  } catch (err) {
    setStatus('Failed to load records: ' + err.message, 'error');
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderTable() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  const sort  = document.getElementById('sort-select').value;

  let rows = allRecords.filter(r =>
    !query || (r.title || '').toLowerCase().includes(query)
  );

  rows.sort((a, b) => {
    if (sort === 'newest') return (b.timestamp || '').localeCompare(a.timestamp || '');
    if (sort === 'oldest') return (a.timestamp || '').localeCompare(b.timestamp || '');
    if (sort === 'az')     return (a.title || '').localeCompare(b.title || '');
    if (sort === 'za')     return (b.title || '').localeCompare(a.title || '');
    return 0;
  });

  document.getElementById('record-count').textContent = `${rows.length} record${rows.length !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('records-body');
  tbody.innerHTML = '';

  if (rows.length === 0) {
    document.getElementById('empty-state').style.display = 'block';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';

  rows.forEach(rec => {
    const tr = document.createElement('tr');
    tr.dataset.id = rec.id;

    const imgUrl   = rec.image_url || '';
    const audioUrl = rec.audio_url || '';
    const ts       = formatTimestamp(rec.timestamp || '');

    tr.innerHTML = `
      <td>
        <div class="thumb-wrap" data-img="${escHtml(imgUrl)}" data-audio="${escHtml(audioUrl)}" data-id="${escHtml(rec.id)}">
          ${imgUrl
            ? `<img src="${escHtml(imgUrl)}" alt="" loading="lazy" />`
            : `<div class="thumb-missing">no img</div>`}
        </div>
      </td>
      <td><span class="col-id-val">${escHtml(rec.id)}</span></td>
      <td>
        <div class="col-title-val">
          ${escHtml(rec.title || '—')}
          <small>${escHtml(rec.long_prompt || '')}</small>
        </div>
      </td>
      <td><span class="col-time-val">${ts}</span></td>
      <td>
        <button class="del-btn" data-id="${escHtml(rec.id)}">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  // delete buttons
  tbody.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => confirmDelete(btn.dataset.id));
  });

  // right-click on thumbnails
  tbody.querySelectorAll('.thumb-wrap').forEach(wrap => {
    wrap.addEventListener('contextmenu', e => {
      e.preventDefault();
      ctxRecord = { id: wrap.dataset.id, imgUrl: wrap.dataset.img, audioUrl: wrap.dataset.audio };
      showCtxMenu(e.clientX, e.clientY);
    });
  });
}

// ── Context menu ──────────────────────────────────────────────────────────────
const ctxMenu = document.getElementById('ctx-menu');

function showCtxMenu(x, y) {
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top  = y + 'px';
  ctxMenu.classList.add('visible');
}

document.addEventListener('click', () => ctxMenu.classList.remove('visible'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') ctxMenu.classList.remove('visible'); });

document.getElementById('ctx-open').addEventListener('click', () => {
  if (ctxRecord?.imgUrl) window.open(ctxRecord.imgUrl, '_blank');
});
document.getElementById('ctx-audio').addEventListener('click', () => {
  if (ctxRecord?.audioUrl) window.open(ctxRecord.audioUrl, '_blank');
});
document.getElementById('ctx-delete').addEventListener('click', () => {
  if (ctxRecord?.id) confirmDelete(ctxRecord.id);
});

// ── Delete ────────────────────────────────────────────────────────────────────
async function confirmDelete(id) {
  const rec = allRecords.find(r => String(r.id) === String(id));
  if (!rec) return;
  const ok = window.confirm(`Delete record #${rec.id}: "${rec.title}"?\n\nThis will remove the image, audio, and text files from GitHub and update ${currentCsv}.`);
  if (!ok) return;

  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if (tr) tr.classList.add('deleting');
  setStatus('<span class="spinner"></span>Deleting record ' + id + '…', '');

  try {
    // Paths to delete
    const filesToDelete = [];
    if (rec.image_url) filesToDelete.push(urlToPath(rec.image_url));
    if (rec.audio_url) filesToDelete.push(urlToPath(rec.audio_url));
    if (rec.text_url)  filesToDelete.push(urlToPath(rec.text_url));

    for (const path of filesToDelete) {
      await deleteGithubFile(path, `Remove ${path} (record ${id})`);
    }

    // Remove from CSV
    allRecords = allRecords.filter(r => String(r.id) !== String(id));
    await updateCsv();

    renderTable();
    setStatus(`Record ${id} deleted.`, 'ok');
  } catch (err) {
    if (tr) tr.classList.remove('deleting');
    setStatus('Delete failed: ' + err.message, 'error');
    console.error(err);
  }
}

function urlToPath(rawUrl) {
  // https://raw.githubusercontent.com/fraloisio/sonic-runs-assets/main/images/0001-…png
  //  → images/0001-…png
  const prefix = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/`;
  return rawUrl.startsWith(prefix) ? rawUrl.slice(prefix.length) : rawUrl;
}

async function getFileSha(path) {
  const res = await fetch(API_BASE + encodeURIPath(path), { headers: authHeaders() });
  if (res.status === 404) return null; // already gone
  if (!res.ok) throw new Error(`getFileSha(${path}) → HTTP ${res.status}`);
  const data = await res.json();
  return data.sha;
}

async function deleteGithubFile(path, message) {
  const sha = await getFileSha(path);
  if (!sha) return; // file already absent — skip silently
  const res = await fetch(API_BASE + encodeURIPath(path), {
    method: 'DELETE',
    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sha, branch: GITHUB_BRANCH }),
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`DELETE ${path} → HTTP ${res.status}: ${body}`);
  }
}

async function updateCsv() {
  // Build CSV string from allRecords
  const headers = ['id','title','timestamp','audio_local','image_local','text_local','audio_url','image_url','text_url','analysis','long_prompt'];
  const csvText = Papa.unparse(allRecords, { columns: headers, newline: '\n' });

  // Get current SHA of the CSV file
  const sha = await getFileSha(currentCsv);
  const body = {
    message: `Admin: delete record via admin.html`,
    content: btoa(unescape(encodeURIComponent(csvText))),
    branch: GITHUB_BRANCH,
  };
  if (sha) body.sha = sha;

  const res = await fetch(API_BASE + currentCsv, {
    method: 'PUT',
    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`PUT ${currentCsv} → HTTP ${res.status}: ${text}`);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function encodeURIPath(path) {
  return path.split('/').map(encodeURIComponent).join('/');
}

function formatTimestamp(ts) {
  // YYYYMMDD-HHMMSS → "25 Mar 2026 · 11:20"
  const m = ts.match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/);
  if (!m) return ts;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${m[3]} ${months[parseInt(m[2],10)-1]} ${m[1]} · ${m[4]}:${m[5]}`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.innerHTML = msg;
  el.className = type || '';
}
</script>
</body>
</html>
